# Render Blueprint — creates the PostgreSQL database + backend API in one click.
# In Render: New + → Blueprint → select this repo → Apply.
# Note: this only deploys the BACKEND + DB. The frontend goes to Vercel (see DEPLOYMENT.md).

databases:
  - name: inventory-db
    databaseName: inventory
    user: inventory
    plan: free # free Postgres expires after ~30 days — upgrade for long-term use

services:
  - type: web
    name: inventory-api
    runtime: node
    plan: free # free web service sleeps after ~15 min idle (cold starts)
    rootDir: backend
    # db push creates the tables from schema.prisma, then seed adds the subscription plans.
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run seed
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false # you fill this in with your Vercel URL after the frontend deploys
